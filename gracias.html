<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Registro Exitoso!</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 100%); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            text-align: center; 
        }
        .card { 
            background: white; 
            padding: 50px 30px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            max-width: 400px;
            width: 90%;
        }
        .icon-check {
            font-size: 50px;
            margin-bottom: 20px;
            display: block;
        }
        h1 { 
            color: #ad1457; 
            font-size: 1.8rem;
            margin-bottom: 15px;
        }
        p { 
            color: #4e4d4d; 
            line-height: 1.6;
            font-size: 1.1rem;
        }
        .footer-text {
            margin-top: 35px;
            border-top: 1px solid #fce4ec;
            padding-top: 20px;
        }
        .footer-text p {
            font-size: 0.9rem;
            color: #615e5e;
            margin-bottom: 10px;
        }
        .ig-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            /* Propiedades corregidas para evitar advertencias */
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
            font-size: 1.2rem;
            text-decoration: none;
            transition: transform 0.3s ease;
        }
        .ig-link:hover {
            transform: scale(1.1);
        }
        .ig-link i {
            color: #bc1888; 
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon-check">✨</span>
        <h1>¡Registro Recibido!</h1>
        <p>Tu información ha sido enviada correctamente. <br> ¡Gracias por unirte a la familia de <strong>Aerial Girl</strong>!</p>
        
        <div class="footer-text">
            <p>Síguenos para ver nuestras publicaciones:</p>
            <a href="https://www.instagram.com/aerialgirlpoledance.pf?igsh=MW1wa3U3amU4YzNraQ==" target="_blank" class="ig-link">
                <i class="fab fa-instagram"></i> @aerialgirl_poledance
            </a>
        </div>
    </div>
</body>
</html>
